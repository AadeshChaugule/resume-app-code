name: CI-Build-and-Update-GitOps

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/resume-app:$IMAGE_TAG ./app
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/resume-app:$IMAGE_TAG

      - name: Update GitOps Repo Tag
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          rm -rf resume-gitops-config
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/${{ github.repository_owner }}/resume-gitops-config.git
          cd resume-gitops-config
          
          sed -i "s/tag: .*/tag: ${{ github.sha }}/g" helm-chart/values.yaml
          
          git add .
          git commit -m "Update image tag to ${{ github.sha }} [skip ci]"
          git push origin main
